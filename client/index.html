<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forsion AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              // Light Mode Brand Colors
              forsion: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                300: '#7dd3fc',
                400: '#38bdf8',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
                800: '#075985',
                900: '#0c4a6e',
                950: '#082f49',
              },
              // Refined Dark Mode Palette (Zinc/Slate based for a 'Tech' feel)
              dark: {
                bg: '#09090b',        // Zinc 950
                card: '#18181b',      // Zinc 900
                sidebar: '#121212',   // Custom dark
                border: '#27272a',    // Zinc 800
                text: '#e4e4e7',      // Zinc 200
                muted: '#a1a1aa'      // Zinc 400
              },
              // Notion Theme Colors
              notion: {
                bg: '#ffffff',
                darkbg: '#191919',
                sidebar: '#f7f7f5',
                darksidebar: '#202020',
                border: '#e9e9e8',
                darkborder: '#2f2f2f'
              },
              qbird: {
                bg: '#F5F5F7',
                darkbg: '#1C1C1E',
              }
            },
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              serif: ['Merriweather', 'ui-serif', 'Georgia', 'serif'],
              cursive: ['"Dancing Script"', 'cursive'],
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            },
            borderRadius: {
              'token-xs': '8px',
              'token-sm': '12px',
              'token-md': '16px',
              'token-lg': '22px',
              'token-xl': '28px',
              'token-pill': '9999px',
            }
          },
        },
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&family=JetBrains+Mono:wght@400&family=Dancing+Script&display=swap');
      
      :root {
        --color-primary: #3E406F;
        --color-secondary: #C1A3B5;
        --color-text: #4A4B6A;
        --glass-surface: rgba(255, 255, 255, 0.65);
        --bg-desktop: linear-gradient(135deg, #A8C5D0 0%, #D4B5C8 50%, #5A5C8A 100%);

        /* Border-radius token system */
        --radius-xs: 8px;
        --radius-sm: 12px;
        --radius-md: 16px;
        --radius-lg: 22px;
        --radius-xl: 28px;
        --radius-pill: 9999px;
      }

      body {
        font-family: 'Inter', sans-serif;
      }
      
      .notion-theme {
        --font-sans: 'Inter', sans-serif;
        --font-serif: 'Merriweather', serif;
      }

      /* Monet Theme Glassmorphism - Softer & More Natural */
      .glass {
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.05),
          0 2px 4px -1px rgba(0, 0, 0, 0.03),
          inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }

      .glass-dark {
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow:
          0 20px 40px -10px rgba(0, 0, 0, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.4);
      }

      .bg-desktop-surface {
        background: var(--bg-desktop);
        background-size: cover;
        background-position: center;
      }

      /* Apple Glass Theme */
      .apple-glass {
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow:
          0 4px 30px rgba(0, 0, 0, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.4);
      }
      .dark .apple-glass {
        background: rgba(30, 30, 30, 0.75);
        border-color: rgba(255, 255, 255, 0.08);
        box-shadow:
          0 4px 30px rgba(0, 0, 0, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      .bg-apple-surface { background: #f5f5f7; }
      .dark .bg-apple-surface { background: #1c1c1e; }

      /* Forsion Theme 1 - Morandi */
      .forsion1-glass {
        background: rgba(255, 252, 248, 0.62);
        backdrop-filter: blur(24px) saturate(140%);
        -webkit-backdrop-filter: blur(24px) saturate(140%);
        border: 1px solid rgba(142, 133, 120, 0.15);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.04),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
      }
      .dark .forsion1-glass {
        background: rgba(40, 38, 36, 0.7);
        border-color: rgba(255, 255, 255, 0.06);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .bg-forsion1-surface { background: #edeae5; }
      .dark .bg-forsion1-surface { background: #1a1918; }

      /* QBird Theme - Apple HIG inspired with cyan/teal accent */
      .qbird-glass {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px) saturate(140%);
        -webkit-backdrop-filter: blur(20px) saturate(140%);
        border: 1px solid rgba(0, 0, 0, 0.09);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06), 0 0 1px rgba(0, 0, 0, 0.08);
      }
      .dark .qbird-glass {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
      }
      .bg-qbird-surface { background: #F5F5F7; }
      .dark .bg-qbird-surface { background: #1C1C1E; }

      /* Shadow for white text on light backgrounds */
      .text-shadow-sm {
        text-shadow: 0 1px 2px rgba(0,0,0,0.1);
      }
      .text-shadow-md {
        text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.4);
        border-radius: 3px;
        transition: background 0.2s;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(148, 163, 184, 0.7);
      }
      .dark ::-webkit-scrollbar-thumb {
        background: rgba(63, 63, 70, 0.5);
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: rgba(63, 63, 70, 0.8);
      }

      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(148, 163, 184, 0.4) transparent;
      }
      .dark * {
        scrollbar-color: rgba(63, 63, 70, 0.5) transparent;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/client": "https://aistudiocdn.com/react-dom@^19.2.0/client",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react-markdown": "https://aistudiocdn.com/react-markdown@^10.1.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/"
  }
}
</script>
</head>
  <body>
    <script>
      // Apply cached theme immediately to prevent flash of default theme
      (function() {
        var theme = localStorage.getItem('forsion_theme') || 'dark';
        var preset = localStorage.getItem('forsion_theme_preset') || 'qbird';
        if (theme === 'dark') document.documentElement.classList.add('dark');
        var map = {
          monet: 'bg-desktop-surface',
          apple: theme === 'dark' ? 'bg-gray-900' : 'bg-gray-100',
          forsion1: theme === 'dark' ? 'bg-zinc-900' : 'bg-[#edeae5]',
          notion: theme === 'dark' ? 'bg-notion-darkbg' : 'bg-notion-bg',
          qbird: theme === 'dark' ? 'bg-[#1C1C1E]' : 'bg-[#F5F5F7]',
          default: theme === 'dark' ? 'bg-dark-bg' : 'bg-white',
        };
        document.body.className = (map[preset] || map['default']) + ' transition-colors duration-300';
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
